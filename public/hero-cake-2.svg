<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="600" fill="#FFF5F7"/>
  
  <!-- Cake Base (Bottom Layer) -->
  <ellipse cx="300" cy="480" rx="180" ry="30" fill="#F4D4D4"/>
  <rect x="120" y="450" width="360" height="30" fill="#FFE4E1"/>
  
  <!-- Cake Middle Layer -->
  <ellipse cx="300" cy="450" rx="180" ry="30" fill="#FFB6C1"/>
  <rect x="120" y="380" width="360" height="70" fill="#FFC0CB"/>
  
  <!-- Cream Layer -->
  <ellipse cx="300" cy="380" rx="180" ry="25" fill="#FFFAF0"/>
  <rect x="120" y="330" width="360" height="50" fill="#FFF8F0"/>
  
  <!-- Top Cake Layer -->
  <ellipse cx="300" cy="330" rx="180" ry="30" fill="#FFB6C1"/>
  <rect x="120" y="260" width="360" height="70" fill="#FFC0CB"/>
  
  <!-- Top Cream -->
  <ellipse cx="300" cy="260" rx="180" ry="25" fill="#FFFAF0"/>
  
  <!-- Strawberries -->
  <ellipse cx="220" cy="240" rx="20" ry="25" fill="#DC143C"/>
  <ellipse cx="280" cy="235" rx="22" ry="28" fill="#DC143C"/>
  <ellipse cx="320" cy="235" rx="22" ry="28" fill="#DC143C"/>
  <ellipse cx="380" cy="240" rx="20" ry="25" fill="#DC143C"/>
  
  <!-- Strawberry leaves -->
  <path d="M 220 225 L 215 220 L 220 220 L 225 220 L 220 225" fill="#228B22"/>
  <path d="M 280 220 L 275 215 L 280 215 L 285 215 L 280 220" fill="#228B22"/>
  <path d="M 320 220 L 315 215 L 320 215 L 325 215 L 320 220" fill="#228B22"/>
  <path d="M 380 225 L 375 220 L 380 220 L 385 220 L 380 225" fill="#228B22"/>
  
  <!-- Seeds on strawberries -->
  <circle cx="218" cy="242" r="2" fill="#F0E68C"/>
  <circle cx="222" cy="245" r="2" fill="#F0E68C"/>
  <circle cx="278" cy="237" r="2" fill="#F0E68C"/>
  <circle cx="282" cy="240" r="2" fill="#F0E68C"/>
  
  <!-- Edible Flowers -->
  <circle cx="180" cy="265" r="8" fill="#DDA0DD"/>
  <circle cx="420" cy="265" r="8" fill="#DDA0DD"/>
  <circle cx="240" cy="275" r="6" fill="#E6E6FA"/>
  <circle cx="360" cy="275" r="6" fill="#E6E6FA"/>
  
  <!-- Drip Effect -->
  <path d="M 170 260 Q 170 280 165 300" stroke="#FFF8F0" stroke-width="8" fill="none"/>
  <path d="M 240 260 Q 240 285 235 305" stroke="#FFF8F0" stroke-width="8" fill="none"/>
  <path d="M 360 260 Q 360 285 355 305" stroke="#FFF8F0" stroke-width="8" fill="none"/>
  <path d="M 430 260 Q 430 280 425 300" stroke="#FFF8F0" stroke-width="8" fill="none"/>
  
  <!-- Text -->
  <text x="300" y="550" font-family="Arial, sans-serif" font-size="24" fill="#8B4789" text-anchor="middle" font-weight="bold">Strawberry Cream Cake</text>
</svg>
