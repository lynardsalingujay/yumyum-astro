<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="600" fill="#F0FFF0"/>
  
  <!-- Cake Base (Bottom Layer) -->
  <ellipse cx="300" cy="480" rx="180" ry="30" fill="#D2B48C"/>
  <rect x="120" y="450" width="360" height="30" fill="#DEB887"/>
  
  <!-- Cake Middle Layer - Chocolate -->
  <ellipse cx="300" cy="450" rx="180" ry="30" fill="#8B4513"/>
  <rect x="120" y="380" width="360" height="70" fill="#A0522D"/>
  
  <!-- Cream Layer -->
  <ellipse cx="300" cy="380" rx="180" ry="25" fill="#F5F5DC"/>
  <rect x="120" y="330" width="360" height="50" fill="#FAEBD7"/>
  
  <!-- Top Cake Layer - Matcha -->
  <ellipse cx="300" cy="330" rx="180" ry="30" fill="#90EE90"/>
  <rect x="120" y="260" width="360" height="70" fill="#98FB98"/>
  
  <!-- Top Cream -->
  <ellipse cx="300" cy="260" rx="180" ry="25" fill="#F5F5DC"/>
  
  <!-- Matcha Powder Dusting -->
  <ellipse cx="300" cy="250" rx="160" ry="15" fill="#8FBC8F" opacity="0.3"/>
  
  <!-- Decorative Elements -->
  <circle cx="240" cy="245" r="12" fill="#FF69B4"/>
  <circle cx="300" cy="240" r="15" fill="#FF1493"/>
  <circle cx="360" cy="245" r="12" fill="#FF69B4"/>
  
  <!-- Mini Strawberry slices -->
  <ellipse cx="210" cy="255" rx="18" ry="12" fill="#DC143C"/>
  <ellipse cx="390" cy="255" rx="18" ry="12" fill="#DC143C"/>
  
  <!-- White chocolate shavings -->
  <rect x="250" y="265" width="15" height="3" fill="#FFFAF0" transform="rotate(15 257 266)"/>
  <rect x="335" y="265" width="15" height="3" fill="#FFFAF0" transform="rotate(-15 342 266)"/>
  <rect x="280" y="270" width="12" height="3" fill="#FFFAF0" transform="rotate(25 286 271)"/>
  
  <!-- Edible Flowers -->
  <circle cx="180" cy="270" r="8" fill="#DDA0DD"/>
  <circle cx="420" cy="270" r="8" fill="#DDA0DD"/>
  <circle cx="200" cy="285" r="6" fill="#E6E6FA"/>
  <circle cx="400" cy="285" r="6" fill="#E6E6FA"/>
  
  <!-- Drip Effect -->
  <path d="M 175 260 Q 175 280 170 300" stroke="#FAEBD7" stroke-width="8" fill="none"/>
  <path d="M 245 260 Q 245 285 240 305" stroke="#FAEBD7" stroke-width="8" fill="none"/>
  <path d="M 355 260 Q 355 285 350 305" stroke="#FAEBD7" stroke-width="8" fill="none"/>
  <path d="M 425 260 Q 425 280 420 300" stroke="#FAEBD7" stroke-width="8" fill="none"/>
  
  <!-- Text -->
  <text x="300" y="550" font-family="Arial, sans-serif" font-size="24" fill="#2F4F2F" text-anchor="middle" font-weight="bold">Matcha Strawberry Cake</text>
</svg>
