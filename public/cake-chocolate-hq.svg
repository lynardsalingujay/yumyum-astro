<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chocolateGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5A3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6F4E37;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="caramelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A572;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ganacheGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#654321;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3E2723;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="creamyWhite" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFEF7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF9E6;stop-opacity:1" />
    </linearGradient>
    <filter id="chocolateShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="glossEffect">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="#FFF8F0"/>
  
  <!-- Shadow base -->
  <ellipse cx="400" cy="630" rx="240" ry="42" fill="#000" opacity="0.12"/>
  
  <!-- Bottom chocolate layer -->
  <ellipse cx="400" cy="620" rx="240" ry="40" fill="url(#chocolateGradient)"/>
  <rect x="160" y="540" width="480" height="80" fill="#6F4E37"/>
  <ellipse cx="400" cy="540" rx="240" ry="40" fill="url(#chocolateGradient)"/>
  
  <!-- Caramel cream layer -->
  <rect x="160" y="500" width="480" height="40" fill="url(#caramelGradient)"/>
  <ellipse cx="400" cy="500" rx="240" ry="40" fill="#DEB887"/>
  
  <!-- Middle chocolate layer -->
  <rect x="160" y="420" width="480" height="80" fill="#6F4E37"/>
  <ellipse cx="400" cy="420" rx="240" ry="40" fill="url(#chocolateGradient)"/>
  
  <!-- White cream layer -->
  <rect x="160" y="380" width="480" height="40" fill="url(#creamyWhite)"/>
  <ellipse cx="400" cy="380" rx="240" ry="40" fill="#FFFEF7"/>
  
  <!-- Top chocolate layer -->
  <rect x="160" y="300" width="480" height="80" fill="#6F4E37"/>
  <ellipse cx="400" cy="300" rx="240" ry="40" fill="url(#chocolateGradient)"/>
  
  <!-- Rich chocolate ganache topping -->
  <rect x="160" y="260" width="480" height="40" fill="url(#ganacheGradient)"/>
  <ellipse cx="400" cy="260" rx="240" ry="40" fill="#654321"/>
  
  <!-- Glossy chocolate glaze effect -->
  <ellipse cx="400" cy="250" rx="210" ry="30" fill="url(#glossEffect)"/>
  
  <!-- Ganache drips -->
  <g filter="url(#chocolateShadow)">
    <path d="M 200 260 Q 200 290 195 320" stroke="#3E2723" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M 260 260 Q 260 300 255 335" stroke="#3E2723" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 320 260 Q 320 295 315 330" stroke="#3E2723" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M 400 260 Q 400 305 395 345" stroke="#3E2723" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M 480 260 Q 480 295 475 330" stroke="#3E2723" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M 540 260 Q 540 300 535 335" stroke="#3E2723" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 600 260 Q 600 290 595 320" stroke="#3E2723" stroke-width="16" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Chocolate decorations on top -->
  <g filter="url(#chocolateShadow)">
    <!-- Chocolate curls -->
    <path d="M 280 240 Q 290 230 300 240 Q 310 250 300 260 Q 290 250 280 240" fill="#3E2723" opacity="0.9"/>
    <path d="M 350 235 Q 365 225 380 235 Q 395 245 380 255 Q 365 245 350 235" fill="#3E2723" opacity="0.9"/>
    <path d="M 420 235 Q 435 225 450 235 Q 465 245 450 255 Q 435 245 420 235" fill="#3E2723" opacity="0.9"/>
    <path d="M 500 240 Q 510 230 520 240 Q 530 250 520 260 Q 510 250 500 240" fill="#3E2723" opacity="0.9"/>
    
    <!-- Chocolate shavings -->
    <rect x="240" y="245" width="30" height="5" fill="#654321" rx="2" transform="rotate(-15 255 247)"/>
    <rect x="320" y="248" width="25" height="4" fill="#654321" rx="2" transform="rotate(20 332 250)"/>
    <rect x="460" y="248" width="25" height="4" fill="#654321" rx="2" transform="rotate(-20 472 250)"/>
    <rect x="540" y="245" width="30" height="5" fill="#654321" rx="2" transform="rotate(15 555 247)"/>
  </g>
  
  <!-- Gold leaf accents -->
  <g opacity="0.7">
    <circle cx="230" cy="250" r="8" fill="#FFD700"/>
    <circle cx="320" cy="245" r="6" fill="#FFD700"/>
    <circle cx="400" cy="243" r="10" fill="#FFD700"/>
    <circle cx="480" cy="245" r="6" fill="#FFD700"/>
    <circle cx="570" cy="250" r="8" fill="#FFD700"/>
    
    <path d="M 260 248 L 270 242 L 268 252 Z" fill="#FFD700"/>
    <path d="M 530 248 L 540 242 L 538 252 Z" fill="#FFD700"/>
  </g>
  
  <!-- Caramel decorative pieces -->
  <g opacity="0.85">
    <circle cx="340" cy="255" r="10" fill="#DEB887"/>
    <circle cx="385" cy="258" r="8" fill="#C9A572"/>
    <circle cx="415" cy="258" r="8" fill="#C9A572"/>
    <circle cx="460" cy="255" r="10" fill="#DEB887"/>
  </g>
  
  <!-- Edible flowers -->
  <g opacity="0.8">
    <circle cx="210" cy="255" r="14" fill="#FFB6C1"/>
    <circle cx="205" cy="250" r="10" fill="#FFC6D3"/>
    <circle cx="215" cy="250" r="10" fill="#FFC6D3"/>
    <circle cx="210" cy="245" r="10" fill="#FFC6D3"/>
    <circle cx="210" cy="260" r="10" fill="#FFC6D3"/>
    <circle cx="210" cy="255" r="6" fill="#FFD700"/>
    
    <circle cx="590" cy="258" r="14" fill="#E6E6FA"/>
    <circle cx="585" cy="253" r="10" fill="#F0F0FF"/>
    <circle cx="595" cy="253" r="10" fill="#F0F0FF"/>
    <circle cx="590" cy="248" r="10" fill="#F0F0FF"/>
    <circle cx="590" cy="263" r="10" fill="#F0F0FF"/>
    <circle cx="590" cy="258" r="6" fill="#FFD700"/>
  </g>
  
  <!-- Cocoa powder dusting -->
  <ellipse cx="400" cy="245" rx="200" ry="25" fill="#654321" opacity="0.15"/>
  <ellipse cx="400" cy="240" rx="170" ry="20" fill="#3E2723" opacity="0.1"/>
  
  <!-- Layer texture highlights -->
  <ellipse cx="400" cy="345" rx="200" ry="20" fill="#8B5A3C" opacity="0.2"/>
  <ellipse cx="400" cy="455" rx="200" ry="20" fill="#8B5A3C" opacity="0.2"/>
  <ellipse cx="400" cy="575" rx="200" ry="20" fill="#8B5A3C" opacity="0.2"/>
  
  <!-- Caramel drizzle accents -->
  <path d="M 220 260 C 230 270 240 265 250 275" stroke="#DEB887" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 550 260 C 560 270 570 265 580 275" stroke="#DEB887" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>
